<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brooklyn Public Library</title>
  <link rel="stylesheet" href="./assets/css/swiper-bundle.min.css">
  <link rel="stylesheet" href="./assets/font/Inter/stylesheet.css">
  <link rel="stylesheet" href="./assets/font/Forum/stylesheet.css">
  <link rel="stylesheet" href="./assets/css/normalize.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
  <div class="header__wrapper">
    <header class="header container flex">
      <div class="header__logo">
        <a href="#" class="header__logo_link">
          <img src="./assets/img/BrooklynPublicLibrary.png" alt="logo" class="header__logo_img">
        </a>
      </div>
      <div class="nav__wrapper flex">
        <nav class="header__nav">
          <ul class="nav__list list-reset flex">
            <li class="nav__item"><a href="#" class="nav__link">About</a></li>
            <li class="nav__item"><a href="#" class="nav__link">Favorites</a></li>
            <li class="nav__item"><a href="#" class="nav__link">Coffee shop</a></li>
            <li class="nav__item"><a href="#" class="nav__link">Contacts</a></li>
            <li class="nav__item"><a href="#" class="nav__link">Library Card</a></li>
          </ul>
        </nav>
      </div>
      <div class="entrance__wrapper">
        <button class="entrance__button btn-reset">
          <svg class="entrance__icon" width="28" height="28" viewBox="0 0 28 28" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M28 14C28 21.732 21.732 28 14 28C6.26801 28 0 21.732 0 14C0 6.26801 6.26801 0 14 0C21.732 0 28 6.26801 28 14ZM18.6667 7.77778C18.6667 10.3551 16.5774 12.4444 14.0001 12.4444C11.4227 12.4444 9.33339 10.3551 9.33339 7.77778C9.33339 5.20045 11.4227 3.11111 14.0001 3.11111C16.5774 3.11111 18.6667 5.20045 18.6667 7.77778ZM19.4998 16.2781C20.9584 17.7367 21.7778 19.715 21.7778 21.7778H14L6.22225 21.7778C6.22225 19.715 7.0417 17.7367 8.50031 16.2781C9.95893 14.8194 11.9372 14 14 14C16.0628 14 18.0411 14.8194 19.4998 16.2781Z"
              fill="white" />
          </svg>

        </button>
      </div>
    </header>
  </div>
  <main>
    <section class="hero">
      <div class="hero__content__wrapper container">
        <div class="title__wrapper flex">
          <h1 class="hero__title">
            Welcome<br>to the Brooklyn Library
          </h1>
        </div>
      </div>
    </section>
    <section class="about indent-section">
      <div class="about__content_wrapper container">
        <h2 class="about__title title flex">
          About
        </h2>
        <p class="about__descr flex">
          The Brooklyn Library is a free workspace, a large number of books and a cozy coffee shop inside
        </p>
        <div class="about__swiper swiper">
          <div class="about__swiper_wrapper swiper-wrapper">
            <div class="about__swiper_slide swiper-slide"><img class="about__swiper_img" src="./assets/img/swiper-about-img1.png" alt="foto"></div>
            <div class="about__swiper_slide swiper-slide"><img class="about__swiper_img" src="./assets/img/swiper-about-img2.png" alt="foto"></div>
            <div class="about__swiper_slide swiper-slide"><img class="about__swiper_img" src="./assets/img/swiper-about-img3.png" alt="foto"></div>
            <div class="about__swiper_slide swiper-slide"><img class="about__swiper_img" src="./assets/img/swiper-about-img4.png" alt="foto"></div>
            <div class="about__swiper_slide swiper-slide"><img class="about__swiper_img" src="./assets/img/swiper-about-img5.png" alt="foto"></div>
          </div>
          <div class="about__swiper_pagination swiper-pagination"></div>
        </div>
      </div>
    </section>
    <section class="favorites indent-section">
      <div class="favorites__contaent_wrapper container">
        <h2 class="favorites__title title flex">
          Favorites
        </h2>
      </div>
    </section>

  </main>
<script src="./assets/js/swiper-bundle.min.js"></script>
<script src="./assets/js/swiper.js"></script>
<script src="./assets/js/index.js"></script>
</body>

</html>

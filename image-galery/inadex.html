<!DOCTYPE html>

        </div>
        <div class="img__wrapper">
            <img class="img__content" src="./assets/img/clipdrop.webp" alt="photo">
        </div>
    </div>
   </main>
   <footer class="footer">
    <div class="wrapper__content container">
        <div class="git__wrapper"><a class="git__link" href="">Skornyak</a></div>

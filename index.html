<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style/normalize.css">
    <link rel="stylesheet" href="./assets/style/style.css">
</head>

<body>
    <div class="wrapper">
        <div class="player">
            <div class="title">Now Playing</div>
            <div class="cover"><img class="cover__img" src="./assets/img/icons8-аудио-волна-64.png" alt="cover"></div>
            <div class="song">WWWWWWW</div>
            <div class="progress__container">
                <div class="progress"></div>
            </div>
            <div class="buttons">
                <div class="btn prev "><img class="rewind" src="./assets/img/icons8-назад-64.png" alt="btn"></div>
                <div class="btn play"><img class="img__src" src="./assets/img/icons8-воспроизведение-64.png" alt="btn">
                </div>
                <div class="btn next "><img class="rewind" src="./assets/img/icons8-вперед-64.png" alt="btn"></div>
            </div>
        </div>
    </div>

</body>
<script src="./assets/js/index.js"></script>

</html>

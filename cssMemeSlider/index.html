<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CssMemeSlider</title>
    <link rel="stylesheet" href="./assets/style/normalize.css">
    <link rel="stylesheet" href="./assets/style/style.css">
    <link rel="stylesheet" href="./assets/style/media.css">
</head>

<body>
    <div class="wrapper container flex">
        <div class="slider middle">
            <div class="slides">
                <input type="radio" name="r" id="r1" checked>
                <input type="radio" name="r" id="r2">
                <input type="radio" name="r" id="r3">
                <input type="radio" name="r" id="r4">

                <div class="slide s1"><img src="./assets/img/images.jpeg" alt=""></div>
                <div class="slide "><img src="./assets/img/work-from-home-meme-740x387.jpeg" alt=""></div>
                <div class="slide "><img src="./assets/img/st,small,507x507-pad,600x600,f8f8f8.u2.jpg" alt=""></div>
                <div class="slide "><img src="./assets/img/5d510a8956d80e9de206636ba0694924.jpeg.webp" alt=""></div>
            </div>
        </div>
    </div>
    <div class="wrapper__control container flex">
        <div class="navigation flex">
            <label for="r1" class="bar"></label>
            <label for="r2" class="bar"></label>
            <label for="r3" class="bar"></label>
            <label for="r4" class="bar"></label>
        </div>
    </div>
</body>

</html>
